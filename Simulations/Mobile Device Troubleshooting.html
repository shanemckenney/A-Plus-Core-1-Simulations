<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mobile Device Troubleshooting</title>

<style>
  :root {
    --bg-dark: #0f172a;
    --sidebar-bg: #1e293b;
    --panel-bg: #111827;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --accent-blue: #3b82f6;
    --accent-hover: #2563eb;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --border: #334155;
    --font-sans: ui-sans-serif, system-ui, -apple-system, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, monospace;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-sans);
    background-color: var(--bg-dark);
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Header Navbar */
  header {
    background: #0b1120;
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .brand { font-weight: 700; font-size: 22px; display: flex; align-items: center; gap: 10px; }
  .brand span { color: var(--accent-blue); }
  .score-badge {
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid var(--accent-blue);
    padding: 8px 16px;
    border-radius: 99px;
    font-weight: 600;
    font-size: 16px;
    color: #93c5fd;
  }

  /* Main Layout */
  .app-container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar (Ticket Queue) */
  .sidebar {
    width: 320px; 
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .sidebar-header {
    padding: 20px;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }
  .ticket-list {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    margin: 0;
    list-style: none;
  }
  .ticket-item {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s;
    opacity: 0.5;
    pointer-events: none;
  }
  .ticket-item.active {
    background: rgba(59, 130, 246, 0.15);
    border-left: 5px solid var(--accent-blue);
    opacity: 1;
    pointer-events: auto;
  }
  .ticket-item.locked {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .ticket-item.closed {
    opacity: 0.7;
    pointer-events: auto;
  }
  .ticket-id { font-family: var(--font-mono); font-size: 14px; font-weight: bold; margin-bottom: 6px;}
  .ticket-caller { font-size: 16px; margin-bottom: 12px; }
  .status-badge {
    display: inline-block;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 4px;
    font-weight: bold;
    text-transform: uppercase;
  }
  .status-open { background: rgba(245, 158, 11, 0.2); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.5); }
  .status-closed { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.5); }
  .status-locked { background: rgba(148, 163, 184, 0.2); color: #cbd5e1; border: 1px solid rgba(148, 163, 184, 0.5); }
  
  .sidebar-footer {
    padding: 16px;
    font-size: 11px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    line-height: 1.5;
    background: rgba(0,0,0,0.1);
  }
  .sidebar-footer strong { color: var(--text-main); }

  /* Workspace (Active Ticket) */
  .workspace {
    flex: 1;
    background: var(--bg-dark);
    padding: 32px;
    overflow-y: auto;
    display: flex;
    justify-content: center;
  }
  .ticket-panel {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    margin-bottom: 40px;
  }
  .panel-header {
    padding: 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .meta-group { display: flex; gap: 32px; margin-top: 16px; }
  .meta-item { display: flex; flex-direction: column; gap: 6px; }
  .meta-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 600;}
  .meta-value { font-size: 16px; }

  .panel-body { padding: 32px; flex: 1; }
  
  .description-box {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border);
    border-left: 4px solid var(--warning);
    padding: 20px;
    border-radius: 4px;
    font-size: 17px;
    line-height: 1.7;
    margin-bottom: 32px;
  }

  /* Forms */
  .form-row {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
  }
  .form-group { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .form-group label { font-size: 14px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
  select {
    width: 100%;
    padding: 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #1e293b;
    color: var(--text-main);
    font-size: 15px;
    outline: none;
  }
  select:focus { border-color: var(--accent-blue); }
  select:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn {
    padding: 14px 28px;
    background: var(--accent-blue);
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

  /* Mentor Feedback */
  .feedback-box {
    margin-top: 32px;
    padding: 20px;
    border-radius: 8px;
    display: none;
    line-height: 1.6;
    font-size: 16px;
  }
  .feedback-box.error {
    display: block;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-left: 4px solid var(--danger);
  }
  .feedback-box.success {
    display: block;
    background: rgba(16, 185, 129, 0.1);
    border: 1px solid rgba(16, 185, 129, 0.3);
    border-left: 4px solid var(--success);
  }
  .feedback-title { font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-size: 18px;}
  .mentor-icon { font-size: 22px; }
  
  /* End Screen */
  .end-screen {
    text-align: center;
    padding: 60px 20px;
  }
  .end-screen h2 { font-size: 32px; color: var(--success); margin-bottom: 16px; }
  .end-screen p { font-size: 18px; color: var(--text-muted); margin-bottom: 40px; }
  .final-score { font-size: 64px; font-weight: bold; color: white; margin-bottom: 16px; }

</style>
</head>
<body>

  <header>
    <div class="brand">
      <span>📱</span> Mobile Device Help Desk
    </div>
    <div class="score-badge" id="global-score">Score: 0 / 80</div>
  </header>

  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">My Ticket Queue</div>
      <ul class="ticket-list" id="ticket-list">
        </ul>
      <div class="sidebar-footer">
        <strong>Instructor Product Notice:</strong> This activity is an instructor-developed training simulation to build troubleshooting and decision-making skills. It is not a replica of any live certification exam.
      </div>
    </aside>

    <main class="workspace">
      <div class="ticket-panel" id="ticket-workspace">
        </div>
    </main>
  </div>

<script>
  // Array randomizer function
  function shuffleArray(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  const tickets = [
    {
      id: "INC-2001",
      caller: "Jessica (Sales)",
      priority: "Low",
      desc: "Hi IT, my phone battery is draining so fast! It used to last all day, but now it's dead by lunch. I haven't dropped it, and the battery health says it's perfectly normal.",
      causes: [
        "Background apps running continuously",
        "High power settings enabled",
        "Poor cellular signal",
        "Aging battery cells"
      ],
      actions: [
        "Review battery usage and restrict background apps",
        "Lower brightness and disable unused radios",
        "Enable power saving mode and restart",
        "Replace the battery"
      ],
      correctIssue: "Background apps running continuously",
      correctSolution: "Review battery usage and restrict background apps",
      mentorWrong: "Before ordering parts or assuming hardware failure, start with the most common software cause. What runs invisibly that drains power?",
      mentorRight: "Spot on! Apps pulling data or keeping the CPU awake are the #1 cause of rapid drain on healthy devices. Always check battery usage stats and restrict background activity before ordering replacement parts."
    },
    {
      id: "INC-2002",
      caller: "Marcus (Field Ops)",
      priority: "Medium",
      desc: "My Wi-Fi works fine when I'm at the corporate office, but the second I drive away, my cellular data is completely dead. Other guys on my team use the same carrier and have perfect 5G service out here.",
      causes: [
        "Airplane mode or cellular radio disabled",
        "Cellular data disabled or APN misconfigured",
        "SIM card not seated or disabled",
        "Carrier network outage"
      ],
      actions: [
        "Verify airplane mode is off and cellular data enabled",
        "Power off, reseat SIM, and retest",
        "Reset network settings",
        "Contact the carrier"
      ],
      correctIssue: "Cellular data disabled or APN misconfigured",
      correctSolution: "Verify airplane mode is off and cellular data enabled",
      mentorWrong: "If Wi-Fi works, the device itself isn't totally dead. If coworkers have signal, the network is up. Focus on the software settings related specifically to cellular data.",
      mentorRight: "Exactly! If Wi-Fi works but cellular doesn't, it's an isolated radio issue. Check the simplest Layer 1/2 settings (like making sure Cellular Data wasn't accidentally toggled off, or verifying the APN) before escalating to the carrier or swapping SIM cards."
    },
    {
      id: "INC-2003",
      caller: "Chloe (Design)",
      priority: "Low",
      desc: "I was messing around in my settings earlier, and now my tablet screen won't rotate sideways anymore when I turn it. The touchscreen itself still works fine.",
      causes: [
        "Orientation/rotation lock enabled",
        "App overriding auto-rotate",
        "Accelerometer/gyroscope sensor fault",
        "OS display service glitch"
      ],
      actions: [
        "Disable orientation/rotation lock and retest",
        "Restart and test without third-party apps",
        "Run sensor diagnostics/calibration",
        "Install pending OS updates"
      ],
      correctIssue: "Orientation/rotation lock enabled",
      correctSolution: "Disable orientation/rotation lock and retest",
      mentorWrong: "Don't jump to a hardware sensor failure just yet. Look closely at the clue: 'I was messing around in my settings earlier...'",
      mentorRight: "Always check the easy stuff first! The most common reason a screen stops rotating is the user accidentally tapping the rotation lock toggle in the quick settings menu. Verify the lock state before running deep diagnostics."
    },
    {
      id: "INC-2004",
      caller: "David (Finance)",
      priority: "High",
      desc: "My laptop is wobbling on my desk and the bottom case looks like it's bowing outward. The trackpad is also really stiff and hard to click suddenly.",
      causes: [
        "Swollen lithium-ion battery",
        "Hinge damage causing case flex",
        "Chassis warped from heat",
        "Incorrect internal reassembly"
      ],
      actions: [
        "Power down immediately and remove from service",
        "Continue using until maintenance window",
        "Reseat internal components while running",
        "Run hardware diagnostics"
      ],
      correctIssue: "Swollen lithium-ion battery",
      correctSolution: "Power down immediately and remove from service",
      mentorWrong: "This is a severe physical safety issue, not a normal hardware glitch. Never keep using or try to open a pressurized, bulging system while it is active.",
      mentorRight: "Great catch. A bulging chassis, especially near the trackpad, is a classic sign of lithium-ion battery gas buildup. This is a severe fire and explosion hazard. The correct A+ protocol is to power it down, disconnect it, and isolate it immediately."
    },
    {
      id: "INC-2005",
      caller: "Omar (Engineering)",
      priority: "Medium",
      desc: "I turn on my laptop and hear the Windows startup sounds, but the built-in screen is totally black. But when I plug it into my external desk monitor, the desktop shows up perfectly.",
      causes: [
        "Brightness turned down or output toggled",
        "Internal display cable disconnected/loose",
        "LCD backlight or display panel failure",
        "GPU failure"
      ],
      actions: [
        "Increase brightness and toggle display output",
        "Inspect and reseat the internal display cable",
        "Replace the display/LCD assembly",
        "Replace the GPU or system board"
      ],
      correctIssue: "Internal display cable disconnected/loose",
      correctSolution: "Inspect and reseat the internal display cable",
      mentorWrong: "If the external display works, that rules out a GPU or motherboard failure. Focus on the physical connection to the internal screen itself.",
      mentorRight: "Perfect logic. If the external monitor works perfectly, the motherboard and GPU are fine. The issue is strictly the path to the built-in screen. A loose LVDS/eDP internal cable is the prime suspect, especially after a bump, drop, or recent repair."
    },
    {
      id: "INC-2006",
      caller: "Elena (Marketing)",
      priority: "Medium",
      desc: "My company OLED tablet has weird, faint, ghostly images of my email app stuck on the screen. It stays there even after I restart the tablet and leave the screen off all weekend.",
      causes: [
        "Permanent screen burn-in",
        "Temporary image retention",
        "Screen protector artifact",
        "Graphics artifact from GPU"
      ],
      actions: [
        "Run a pixel refresh feature",
        "Reduce brightness and screen timeout",
        "Replace the display/LCD assembly",
        "Update the OS and retest"
      ],
      correctIssue: "Permanent screen burn-in",
      correctSolution: "Replace the display/LCD assembly",
      mentorWrong: "If the image persists even after the screen has been powered completely off for a weekend, it's not a temporary glitch. Software settings won't fix physical pixel degradation.",
      mentorRight: "Correct. OLED and older LCD panels can suffer permanent ghosting (burn-in) if static images are left on max brightness for months. Once it's burned in and persists through power cycles, the only fix is complete hardware replacement."
    },
    {
      id: "INC-2007",
      caller: "Greg (Executives)",
      priority: "High",
      desc: "I'm trying to present to the board. My laptop is awake, and I plugged it into the HDMI cable, but the conference room projector just shows a blue screen that says 'No Signal'.",
      causes: [
        "Projector set to wrong input/source",
        "Unsupported resolution or refresh rate",
        "Loose or damaged video cable/adapter",
        "Projector lamp failure"
      ],
      actions: [
        "Select the correct input/source on the projector",
        "Lower resolution and duplicate display",
        "Reseat/replace the external video cable",
        "Test with a known-good device"
      ],
      correctIssue: "Projector set to wrong input/source",
      correctSolution: "Select the correct input/source on the projector",
      mentorWrong: "Don't assume the cable or projector is broken right away. 'No Signal' means the projector works, but it can't find the data. What is the simplest solution?",
      mentorRight: "Nailed it. When moving cables or switching rooms, the projector often just needs to be told which port to look at. Always cycle the inputs/sources before assuming the cable, laptop, or lamp is bad."
    },
    {
      id: "INC-2008",
      caller: "Alicia (HR)",
      priority: "Medium",
      desc: "Your team just replaced my cracked laptop screen this morning. It looks beautiful, but now the laptop won't connect to Wi-Fi at all. Everyone else near me is connected fine.",
      causes: [
        "Wi-Fi antennas not reconnected",
        "Wireless network card not seated",
        "Wireless is disabled (airplane mode)",
        "Wireless router failure"
      ],
      actions: [
        "Inspect and reconnect Wi-Fi antenna leads",
        "Reseat the wireless network card",
        "Verify Wi-Fi is enabled",
        "Reset network settings"
      ],
      correctIssue: "Wi-Fi antennas not reconnected",
      correctSolution: "Inspect and reconnect Wi-Fi antenna leads",
      mentorWrong: "Think about the history of the device. A recent physical repair to the screen directly involves components that route through that exact area. What got missed?",
      mentorRight: "Excellent troubleshooting! Wi-Fi antenna wires run straight from the motherboard, through the laptop hinges, and up into the screen lid. If a tech just replaced the screen assembly, it is highly likely they forgot to snap the tiny antenna cables back onto the Wi-Fi card."
    }
  ];

  let currentTicketIndex = 0;
  let totalScore = 0;
  let currentTicketAttempts = 0;

  // DOM Elements
  const ticketListEl = document.getElementById('ticket-list');
  const workspaceEl = document.getElementById('ticket-workspace');
  const globalScoreEl = document.getElementById('global-score');

  function renderSidebar() {
    ticketListEl.innerHTML = '';
    
    tickets.forEach((ticket, index) => {
      const li = document.createElement('li');
      li.className = 'ticket-item';
      
      let statusHtml = '';
      if (index < currentTicketIndex) {
        li.classList.add('closed');
        statusHtml = '<span class="status-badge status-closed">Closed</span>';
      } else if (index === currentTicketIndex) {
        li.classList.add('active');
        statusHtml = '<span class="status-badge status-open">Open</span>';
      } else {
        li.classList.add('locked');
        statusHtml = '<span class="status-badge status-locked">Locked</span>';
      }

      li.innerHTML = `
        <div class="ticket-id">${ticket.id}</div>
        <div class="ticket-caller">${ticket.caller}</div>
        ${statusHtml}
      `;
      
      // Allow clicking previously solved tickets to review them
      if (index <= currentTicketIndex) {
        li.onclick = () => renderTicket(index);
      }
      
      ticketListEl.appendChild(li);
    });
  }

  function createDropdown(options, placeholder) {
    const select = document.createElement("select");
    const defaultOpt = document.createElement("option");
    defaultOpt.value = "";
    defaultOpt.textContent = placeholder;
    defaultOpt.disabled = true;
    defaultOpt.selected = true;
    select.appendChild(defaultOpt);
    
    // Shuffle the options so they are randomized for every load
    const randomizedOptions = shuffleArray(options);
    
    randomizedOptions.forEach(opt => {
      const option = document.createElement("option");
      option.value = opt;
      option.textContent = opt;
      select.appendChild(option);
    });
    return select;
  }

  function renderTicket(index) {
    const ticket = tickets[index];
    const isCompleted = index < currentTicketIndex;
    
    // Reset attempts if viewing the current active ticket
    if (index === currentTicketIndex) {
      currentTicketAttempts = 0;
    }

    workspaceEl.innerHTML = `
      <div class="panel-header">
        <div>
          <h2 style="margin: 0; font-size: 24px;">${ticket.id} - Mobile & Laptop Diagnostics</h2>
          <div class="meta-group">
            <div class="meta-item">
              <span class="meta-label">Caller</span>
              <span class="meta-value">${ticket.caller}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Priority</span>
              <span class="meta-value" style="color: ${ticket.priority === 'High' ? 'var(--danger)' : ticket.priority === 'Medium' ? 'var(--warning)' : 'var(--text-main)'}; font-weight: bold;">${ticket.priority}</span>
            </div>
          </div>
        </div>
      </div>
      
      <div class="panel-body">
        <div class="meta-label" style="margin-bottom: 12px;">User Description</div>
        <div class="description-box">"${ticket.desc}"</div>

        <div class="form-row">
          <div class="form-group" id="issue-group">
            <label>Root Cause Analysis</label>
          </div>
          <div class="form-group" id="solution-group">
            <label>Action Taken (Resolution)</label>
          </div>
        </div>

        <button class="btn" id="resolve-btn" ${isCompleted ? 'disabled' : ''}>
          ${isCompleted ? 'Ticket Closed' : 'Resolve Incident'}
        </button>

        <div id="feedback-area"></div>
      </div>
    `;

    // Only pass the 4 specific options for this ticket
    const issueSelect = createDropdown(ticket.causes, "-- Select Root Cause --");
    const solutionSelect = createDropdown(ticket.actions, "-- Select Action Taken --");
    
    if (isCompleted) {
      issueSelect.value = ticket.correctIssue;
      solutionSelect.value = ticket.correctSolution;
      issueSelect.disabled = true;
      solutionSelect.disabled = true;
    }

    document.getElementById('issue-group').appendChild(issueSelect);
    document.getElementById('solution-group').appendChild(solutionSelect);

    if (!isCompleted) {
      document.getElementById('resolve-btn').onclick = () => {
        checkResolution(index, issueSelect.value, solutionSelect.value);
      };
    } else {
      // Show correct feedback immediately if reviewing a closed ticket
      showFeedback(ticket.mentorRight, true);
    }
  }

  function showFeedback(message, isSuccess) {
    const area = document.getElementById('feedback-area');
    area.innerHTML = `
      <div class="feedback-box ${isSuccess ? 'success' : 'error'}">
        <div class="feedback-title">
          <span class="mentor-icon">${isSuccess ? '🎓' : '💡'}</span> 
          Senior Tech Notes:
        </div>
        ${message}
      </div>
    `;
  }

  function checkResolution(index, selectedIssue, selectedSolution) {
    const ticket = tickets[index];
    
    if (!selectedIssue || !selectedSolution) {
      alert("Please select both a Root Cause and an Action Taken.");
      return;
    }

    currentTicketAttempts++;

    if (selectedIssue === ticket.correctIssue && selectedSolution === ticket.correctSolution) {
      // Correct! Calculate points based on FCR (First Contact Resolution)
      let pointsEarned = 0;
      if (currentTicketAttempts === 1) pointsEarned = 10;
      else if (currentTicketAttempts === 2) pointsEarned = 5;
      else pointsEarned = 2;

      totalScore += pointsEarned;
      globalScoreEl.textContent = `Score: ${totalScore} / 80`;

      showFeedback(`<strong>+${pointsEarned} Points!</strong><br><br>${ticket.mentorRight}`, true);
      
      // Disable inputs
      document.querySelector('#issue-group select').disabled = true;
      document.querySelector('#solution-group select').disabled = true;
      
      const btn = document.getElementById('resolve-btn');
      btn.textContent = "Next Ticket ➔";
      btn.style.background = "var(--success)";
      
      btn.onclick = () => {
        currentTicketIndex++;
        if (currentTicketIndex >= tickets.length) {
          showEndScreen();
        } else {
          renderSidebar();
          renderTicket(currentTicketIndex);
        }
      };
      
      // Update sidebar instantly to show it closed
      const currentLi = ticketListEl.children[index];
      currentLi.classList.remove('active');
      currentLi.classList.add('closed');
      currentLi.querySelector('.status-badge').className = "status-badge status-closed";
      currentLi.querySelector('.status-badge').textContent = "Closed";

    } else {
      // Wrong answer
      showFeedback(ticket.mentorWrong, false);
    }
  }

  function showEndScreen() {
    workspaceEl.innerHTML = `
      <div class="end-screen">
        <h2>Shift Completed!</h2>
        <p>You have successfully closed all tickets in your queue.</p>
        <div style="font-size: 16px; text-transform: uppercase; color: var(--text-muted); font-weight: bold; margin-bottom: 10px;">Final Score</div>
        <div class="final-score">${totalScore} / 80</div>
        <p style="max-width: 600px; margin: 0 auto; line-height: 1.7;">
          ${totalScore >= 70 ? "Excellent work! You have a great grasp on mobile device diagnostics and FCR (First-Contact Resolution)." : 
            totalScore >= 50 ? "Good job! You're getting the hang of it, but there's room to improve your initial diagnostic accuracy." : 
            "Keep studying! Review the tickets in your queue on the left to see the explanations and reinforce your hardware knowledge."}
        </p>
      </div>
    `;
    renderSidebar(); // Final update to sidebar
  }

  // Initialize
  renderSidebar();
  renderTicket(currentTicketIndex);

</script>
</body>
</html>
